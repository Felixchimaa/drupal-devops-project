---
- name: Configure Drupal Servers
  hosts: drupal
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Install PHP packages
      apt:
        name:
          - php
          - php-cli
          - php-mysql
          - php-xml
          - php-gd
          - php-curl
          - php-mbstring
          - php-zip
          - unzip
          - wget
        state: present

    - name: Enable Apache
      service:
        name: apache2
        enabled: yes
        state: started

    - name: Download Drupal
      get_url:
        url: https://ftp.drupal.org/files/projects/drupal-10.3.6.zip
        dest: /tmp/drupal.zip

    - name: Unzip Drupal
      unarchive:
        src: /tmp/drupal.zip
        dest: /var/www/html/
        remote_src: yes

    - name: Set ownership
      file:
        path: /var/www/html
        owner: www-data
        group: www-data
        recurse: yes

    - name: Restart Apache
      service:
        name: apache2
        state: restarted
